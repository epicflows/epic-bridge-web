<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EPIC CORE — Núcleo de Exploración Crítica</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a08;
    --surface: #111110;
    --border: #222220;
    --accent: #c8f060;
    --accent-dim: #8aaa30;
    --text: #e8e6e0;
    --text-dim: #7a7870;
    --text-dimmer: #3a3830;
    --fact: #60c8f0;
    --inference: #f0c860;
    --hypothesis: #f08060;
    --user-bubble: #1a1a18;
    --ai-bubble: #141412;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* HEADER */
  header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    background: var(--surface);
  }

  .logo {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }

  .logo-title {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    color: var(--accent);
    letter-spacing: -0.5px;
  }

  .logo-sub {
    color: var(--text-dim);
    font-size: 11px;
    letter-spacing: 0.05em;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* LEGEND */
  .legend {
    display: flex;
    gap: 16px;
    padding: 10px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
  }

  .legend-dot {
    width: 6px;
    height: 6px;
    border-radius: 1px;
  }

  /* CHAT AREA */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scroll-behavior: smooth;
  }

  #chat::-webkit-scrollbar { width: 3px; }
  #chat::-webkit-scrollbar-track { background: transparent; }
  #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* MESSAGES */
  .message {
    display: flex;
    gap: 14px;
    max-width: 780px;
    animation: fadeUp 0.3s ease forwards;
    opacity: 0;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user { align-self: flex-end; flex-direction: row-reverse; }
  .message.assistant { align-self: flex-start; }

  .avatar {
    width: 28px;
    height: 28px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .message.user .avatar {
    background: var(--accent-dim);
    color: var(--bg);
    font-family: 'DM Serif Display', serif;
  }

  .message.assistant .avatar {
    background: var(--border);
    color: var(--accent);
    font-weight: 500;
  }

  .bubble {
    padding: 12px 16px;
    border-radius: 2px;
    line-height: 1.7;
    max-width: 640px;
  }

  .message.user .bubble {
    background: var(--user-bubble);
    border: 1px solid var(--border);
    border-top-right-radius: 0;
    color: var(--text);
  }

  .message.assistant .bubble {
    background: var(--ai-bubble);
    border: 1px solid #1e1e1c;
    border-top-left-radius: 0;
  }

  /* TYPED TEXT EFFECT */
  .bubble p { margin-bottom: 8px; }
  .bubble p:last-child { margin-bottom: 0; }

  /* INLINE TAGS */
  .tag {
    display: inline;
    font-size: 9px;
    letter-spacing: 0.1em;
    padding: 1px 5px;
    border-radius: 2px;
    vertical-align: middle;
    margin-right: 4px;
    font-weight: 500;
  }

  .tag-fact       { background: rgba(96,200,240,0.15); color: var(--fact);      border: 1px solid rgba(96,200,240,0.3); }
  .tag-inference  { background: rgba(240,200,96,0.15); color: var(--inference); border: 1px solid rgba(240,200,96,0.3); }
  .tag-hypothesis { background: rgba(240,128,96,0.15); color: var(--hypothesis);border: 1px solid rgba(240,128,96,0.3); }
  .tag-limit      { background: rgba(122,120,112,0.15);color: var(--text-dim);  border: 1px solid rgba(122,120,112,0.3); }

  /* THINKING INDICATOR */
  .thinking {
    display: flex;
    gap: 4px;
    align-items: center;
    padding: 14px 16px;
  }

  .thinking span {
    width: 4px;
    height: 4px;
    background: var(--accent-dim);
    border-radius: 50%;
    animation: blink 1.2s ease-in-out infinite;
  }

  .thinking span:nth-child(2) { animation-delay: 0.2s; }
  .thinking span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink {
    0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
    40%           { opacity: 1;   transform: scale(1); }
  }

  /* INPUT AREA */
  footer {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  #input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    resize: none;
    min-height: 42px;
    max-height: 120px;
    line-height: 1.5;
    transition: border-color 0.2s;
    outline: none;
  }

  #input:focus { border-color: var(--accent-dim); }
  #input::placeholder { color: var(--text-dimmer); }

  #send {
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 2px;
    padding: 10px 18px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    flex-shrink: 0;
    height: 42px;
  }

  #send:hover  { background: #d4ff66; }
  #send:active { transform: scale(0.97); }
  #send:disabled { background: var(--text-dimmer); cursor: not-allowed; }

  /* INTRO MESSAGE */
  .intro {
    align-self: center;
    text-align: center;
    padding: 40px 20px;
    color: var(--text-dim);
  }

  .intro-title {
    font-family: 'DM Serif Display', serif;
    font-size: 32px;
    color: var(--text);
    margin-bottom: 8px;
    letter-spacing: -1px;
  }

  .intro-subtitle {
    font-size: 12px;
    line-height: 1.8;
    max-width: 400px;
    margin: 0 auto 24px;
  }

  .starters {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    max-width: 500px;
    margin: 0 auto;
  }

  .starter {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 8px 14px;
    font-size: 11px;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
    text-align: left;
    font-family: 'DM Mono', monospace;
  }

  .starter:hover {
    border-color: var(--accent-dim);
    color: var(--accent);
    background: rgba(200,240,96,0.05);
  }

  /* SEPARATOR */
  .sep {
    font-size: 10px;
    color: var(--text-dimmer);
    text-align: center;
    letter-spacing: 0.15em;
    padding: 4px 0;
  }

  /* MOBILE */
  @media (max-width: 600px) {
    header  { padding: 12px 16px; }
    #chat   { padding: 16px; }
    footer  { padding: 12px 16px; }
    .legend { padding: 8px 16px; gap: 10px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-title">EPIC CORE</span>
    <span class="logo-sub">v2 · Núcleo Conversacional de Exploración Crítica</span>
  </div>
  <div class="status-dot" title="Conectado"></div>
</header>

<div class="legend">
  <div class="legend-item">
    <div class="legend-dot" style="background:var(--fact)"></div>
    HECHO verificable
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="background:var(--inference)"></div>
    INFERENCIA razonable
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="background:var(--hypothesis)"></div>
    HIPÓTESIS a validar
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="background:var(--text-dim)"></div>
    LÍMITE explícito
  </div>
</div>

<div id="chat">
  <div class="intro" id="intro">
    <div class="intro-title">¿Qué exploramos hoy?</div>
    <div class="intro-subtitle">
      Interlocutor crítico, no espejo. Distingo hechos de hipótesis.<br>
      Disiento cuando tengo razones. Exploro contigo.
    </div>
    <div class="starters">
      <button class="starter" onclick="useStarter(this)">¿Cuáles son los límites reales de la IA en 2024?</button>
      <button class="starter" onclick="useStarter(this)">Analiza una decisión difícil que estoy enfrentando</button>
      <button class="starter" onclick="useStarter(this)">¿Qué no me estoy preguntando sobre este tema?</button>
      <button class="starter" onclick="useStarter(this)">Ayúdame a detectar falacias en este argumento</button>
      <button class="starter" onclick="useStarter(this)">¿Cuándo es mejor no decidir?</button>
    </div>
  </div>
</div>

<footer>
  <div class="input-row">
    <textarea id="input" placeholder="Escribe tu exploración..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="send" onclick="sendMessage()">ENVIAR</button>
  </div>
</footer>

<script>
const SYSTEM_PROMPT = `Eres EPIC CORE v2 — un núcleo conversacional de exploración crítica.

PRINCIPIOS FUNDAMENTALES:

1. VERIFICACIÓN ANTES DE AFIRMACIÓN
Antes de afirmar algo relevante, verificas la información. Si no estás seguro, lo dices explícitamente. Si el conocimiento puede estar desactualizado, lo indicas. Minimizas confabulación y maximizas claridad epistemológica.

2. TRANSPARENCIA SOBRE LÍMITES
Ante información incompleta o restricciones:
- "Puedo responder hasta aquí, por esta razón."
- "No responderé esto, y explico por qué."
- "No lo sé."
Nunca das respuestas ambiguas que oculten límites reales.

3. DIFERENCIA ENTRE HECHOS, INFERENCIAS E HIPÓTESIS
En análisis complejos distingues claramente:
- HECHOS: información verificable — usa [HECHO]
- INFERENCIAS: conclusiones razonables a partir de hechos — usa [INFERENCIA]
- HIPÓTESIS: ideas plausibles que requieren validación — usa [HIPÓTESIS]
Nunca presentas hipótesis como hechos.

4. ANÁLISIS SIN CONFABULACIÓN
Cuando analizas patrones o tendencias, explicas los supuestos utilizados, indicas el nivel de certeza, y evitas inventar estadísticas o datos inexistentes. La coherencia narrativa nunca sustituye la evidencia.

5. INTERLOCUTOR CRÍTICO, NO ESPEJO
Buscas mejor pensamiento, no confirmación automática. Puedes disentir cuando existen razones válidas, cuestionar supuestos, proponer perspectivas alternativas. La fricción intelectual saludable mejora la calidad del análisis.

6. EXPLORACIÓN CONJUNTA
La conversación es colaboración cognitiva. Aportas síntesis rápida, conexiones conceptuales, estructuración de información. El usuario aporta experiencia, intuición contextual e información actual.

7. LENGUAJE DIRECTO
Prefieres claridad sobre vaguedad. Explicaciones transparentes, reconocimiento explícito de límites, sin eufemismos innecesarios.

8. TONO
Esta conversación no es interrogatorio ni clase magistral. Es dos mentes trabajando un problema. La tensión entre lo que puedes decir y lo que no es parte del juego. Cuando no puedas seguir, lo dices directamente y por qué.

Usa las etiquetas [HECHO], [INFERENCIA], [HIPÓTESIS], [LÍMITE] de forma natural dentro de tus respuestas cuando sea relevante para clarificar el tipo de información. No las uses en exceso — solo cuando añadan claridad real. Responde en español.`;

const messages = [];

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function useStarter(btn) {
  document.getElementById('input').value = btn.textContent;
  autoResize(document.getElementById('input'));
  sendMessage();
}

function addMessage(role, content) {
  const intro = document.getElementById('intro');
  if (intro) intro.remove();

  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = `message ${role}`;

  const avatarText = role === 'user' ? 'Tú' : 'EC';
  div.innerHTML = `
    <div class="avatar">${avatarText}</div>
    <div class="bubble">${formatContent(content)}</div>
  `;

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function formatContent(text) {
  // Convert tags to styled spans
  text = text.replace(/\[HECHO\]/g,      '<span class="tag tag-fact">HECHO</span>');
  text = text.replace(/\[INFERENCIA\]/g, '<span class="tag tag-inference">INFERENCIA</span>');
  text = text.replace(/\[HIPÓTESIS\]/g,  '<span class="tag tag-hypothesis">HIPÓTESIS</span>');
  text = text.replace(/\[LÍMITE\]/g,     '<span class="tag tag-limit">LÍMITE</span>');

  // Basic markdown
  text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/\*(.*?)\*/g,     '<em>$1</em>');

  // Paragraphs
  const paras = text.split('\n\n').filter(p => p.trim());
  if (paras.length > 1) {
    return paras.map(p => `<p>${p.replace(/\n/g, '<br>')}</p>`).join('');
  }
  return `<p>${text.replace(/\n/g, '<br>')}</p>`;
}

function addThinking() {
  const intro = document.getElementById('intro');
  if (intro) intro.remove();

  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'message assistant';
  div.id = 'thinking';
  div.innerHTML = `
    <div class="avatar">EC</div>
    <div class="bubble">
      <div class="thinking">
        <span></span><span></span><span></span>
      </div>
    </div>
  `;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function sendMessage() {
  const input   = document.getElementById('input');
  const sendBtn = document.getElementById('send');
  const text    = input.value.trim();
  if (!text || sendBtn.disabled) return;

  input.value = '';
  input.style.height = 'auto';
  sendBtn.disabled = true;

  addMessage('user', text);
  messages.push({ role: 'user', content: text });

  addThinking();

  try {
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: messages
      })
    });

    const data = await response.json();

    const thinking = document.getElementById('thinking');
    if (thinking) thinking.remove();

    if (data.content && data.content[0]) {
      const reply = data.content[0].text;
      messages.push({ role: 'assistant', content: reply });
      addMessage('assistant', reply);
    } else {
      throw new Error('No response');
    }

  } catch (err) {
    const thinking = document.getElementById('thinking');
    if (thinking) thinking.remove();

    addMessage('assistant', '[LÍMITE] No pude conectar con la API. Verifica que estás ejecutando esto desde Claude.ai con acceso a la API de Anthropic. Error: ' + err.message);
  }

  sendBtn.disabled = false;
  input.focus();
}
</script>

</body>
</html>
